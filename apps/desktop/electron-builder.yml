appId: com.bulleconsulting.bullebrowser
productName: BulleBrowser
copyright: Copyright © 2026 Bulle Consulting

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/*.{ts,tsx,map}"

asar: false
asarUnpack:
  - resources/**

mac:
  category: public.app-category.productivity
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  notarize: false
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: resources/icon.icns


win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: resources/icon.ico
  publisherName: Bulle Consulting

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: "${productName}-Setup-${version}-${arch}.${ext}"

linux:
  category: Network
  artifactName: "${productName}-${version}-${arch}.${ext}"
  maintainer: Bulle Consulting <hello@bulleconsulting.com>
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
  icon: resources/icon.png
  desktop:
    Name: BulleBrowser
    Comment: The agentic AI web browser
    Categories: Network;WebBrowser;


publish:
  provider: github
  owner: wardere83
  repo: bullebrowser
  releaseType: release
