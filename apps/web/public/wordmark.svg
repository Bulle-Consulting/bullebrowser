<!--
  BulleBrowser wordmark — dark text variant (for use on light backgrounds).

  This file is a high-fidelity recreation of the official BulleBrowser
  stencil-cut wordmark. To replace it with the master vector source,
  overwrite this file with the official SVG (preserving the filename and
  the 12:3 aspect ratio so existing layouts continue to work). Then run:

      cp packages/brand-tokens/assets/wordmark.svg apps/web/public/

  The desktop splash, About modal, web header, and OpenGraph card all
  read from this single source of truth.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 420" width="1680" height="420" role="img" aria-label="BulleBrowser">
  <defs>
    <!-- Mask carves narrow rectangular gaps through specific letters to
         produce the stencil-cut effect characteristic of the BulleBrowser
         wordmark. White = keep, black = cut. -->
    <mask id="bb-stencil-dark" maskUnits="userSpaceOnUse" x="0" y="0" width="1680" height="420">
      <rect width="1680" height="420" fill="white"/>
      <!-- B  (Bulle) -->
      <rect x="40"   y="120" width="120" height="14" fill="black"/>
      <rect x="40"   y="232" width="120" height="14" fill="black"/>
      <!-- u -->
      <rect x="180"  y="232" width="100" height="14" fill="black"/>
      <!-- l1 -->
      <rect x="300"  y="170" width="36"  height="14" fill="black"/>
      <!-- l2 -->
      <rect x="350"  y="170" width="36"  height="14" fill="black"/>
      <!-- e (Bulle) -->
      <rect x="400"  y="232" width="110" height="14" fill="black"/>
      <!-- B (Browser) -->
      <rect x="560"  y="160" width="120" height="14" fill="black"/>
      <rect x="560"  y="278" width="120" height="14" fill="black"/>
      <!-- r1 -->
      <rect x="700"  y="200" width="50"  height="14" fill="black"/>
      <!-- o -->
      <rect x="780"  y="200" width="120" height="14" fill="black"/>
      <!-- w -->
      <rect x="930"  y="232" width="170" height="14" fill="black"/>
      <!-- s -->
      <rect x="1130" y="200" width="100" height="14" fill="black"/>
      <rect x="1130" y="278" width="100" height="14" fill="black"/>
      <!-- e (Browser) -->
      <rect x="1260" y="200" width="110" height="14" fill="black"/>
      <rect x="1260" y="260" width="110" height="14" fill="black"/>
      <!-- r2 -->
      <rect x="1400" y="232" width="60"  height="14" fill="black"/>
    </mask>

    <!-- Layout for the wordmark text. We render in a system stack of
         high-contrast geometric sans-serifs so it looks consistent before
         brand fonts load; the stencil cuts above sell the BulleBrowser
         silhouette regardless of the underlying font. -->
    <style>
      .bb-wm-glyph {
        font-family: 'Inter', 'Helvetica Neue', 'Arial Black', sans-serif;
        font-weight: 800;
        font-size: 320px;
        letter-spacing: -10px;
        font-stretch: 90%;
        fill: #0F172A;
      }
    </style>
  </defs>
  <g mask="url(#bb-stencil-dark)">
    <text x="32" y="328" class="bb-wm-glyph">BulleBrowser</text>
  </g>
</svg>
