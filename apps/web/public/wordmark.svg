<!--
  BulleBrowser wordmark — dark text variant (for use on light backgrounds).
  Stencil-cut sans-serif wordmark with a subtle accent dot, matching the
  Bulle Consulting brand mark. Drop a higher-fidelity SVG export here to
  override; the assets/* paths are referenced from packages/brand-tokens.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 320" width="1680" height="320" role="img" aria-label="BulleBrowser">
  <defs>
    <style>
      .bb-wm-text {
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 700;
        font-size: 220px;
        letter-spacing: -6px;
        fill: #0F172A;
      }
      .bb-wm-cut {
        fill: #FFFFFF;
      }
    </style>
    <mask id="bb-wm-mask-dark">
      <rect width="1680" height="320" fill="white"/>
      <!-- stencil cuts: thin horizontal slices through specific letters -->
      <rect x="105" y="180" width="60" height="6"/>
      <rect x="365" y="120" width="60" height="6"/>
      <rect x="540" y="180" width="60" height="6"/>
      <rect x="900" y="180" width="60" height="6"/>
      <rect x="1100" y="120" width="60" height="6"/>
      <rect x="1280" y="180" width="60" height="6"/>
      <rect x="1480" y="120" width="60" height="6"/>
    </mask>
  </defs>
  <g mask="url(#bb-wm-mask-dark)">
    <text x="50" y="240" class="bb-wm-text">BulleBrowser</text>
  </g>
</svg>
