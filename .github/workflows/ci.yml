name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - name: Tests with coverage gate
        run: pnpm --filter @bullebrowser/agent-core test
      - name: Web build smoke
        run: pnpm --filter @bullebrowser/web build
      - name: Desktop build smoke
        run: pnpm --filter @bullebrowser/desktop build
